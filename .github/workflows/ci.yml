name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Checkout kenken library
        uses: actions/checkout@v4
        with:
          repository: wpm/KenKen
          path: ../kenken

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Format
        run: cargo fmt --all -- --check

      - name: Clippy (frontend)
        run: |
          cargo clippy --manifest-path Cargo.toml --all-targets --target wasm32-unknown-unknown -- \
            -D warnings \
            -D clippy::all \
            -D clippy::pedantic \
            -D clippy::nursery \
            -D clippy::unwrap_used \
            -D clippy::expect_used \
            -D clippy::panic \
            -D clippy::todo \
            -D clippy::unimplemented \
            -D clippy::dbg_macro \
            -D clippy::print_stdout \
            -D clippy::print_stderr

      - name: Clippy (Tauri backend)
        run: |
          cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- \
            -D warnings \
            -D clippy::all \
            -D clippy::pedantic \
            -D clippy::nursery \
            -D clippy::unwrap_used \
            -D clippy::expect_used \
            -D clippy::panic \
            -D clippy::todo \
            -D clippy::unimplemented \
            -D clippy::dbg_macro \
            -D clippy::print_stdout \
            -D clippy::print_stderr

      - name: Test (Tauri backend)
        run: cargo test --manifest-path src-tauri/Cargo.toml --all-features

      - name: Doc
        run: |
          cargo doc --manifest-path src-tauri/Cargo.toml --no-deps --all-features
        env:
          RUSTDOCFLAGS: -D warnings
