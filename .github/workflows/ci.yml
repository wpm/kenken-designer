name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Checkout kenken library
        uses: actions/checkout@v6
        with:
          repository: wpm/KenKen
          path: kenken-lib

      - name: Point kenken path dep to checked-out library
        run: |
          sed -i 's|kenken = { path = "../../kenken" }|kenken = { path = "../kenken-lib" }|' src-tauri/Cargo.toml

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: rustfmt, clippy, llvm-tools-preview

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
            src-tauri -> target

      - name: Keep downloaded apt packages
        run: |
          echo 'Binary::apt::APT::Keep-Downloaded-Packages "true";' \
            | sudo tee /etc/apt/apt.conf.d/99keep-debs > /dev/null

      - name: Cache apt packages
        id: apt-cache
        uses: actions/cache@v5
        with:
          path: |
            /var/cache/apt/archives
            /var/lib/apt/lists
          key: apt-${{ runner.os }}-libwebkit2gtk-4.1-libappindicator3-librsvg2-patchelf

      - name: Install system dependencies
        run: |
          if [ "${{ steps.apt-cache.outputs.cache-hit }}" != "true" ]; then
            sudo apt-get update
          fi
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Format
        run: cargo fmt --all -- --check

      - name: Clippy (frontend)
        run: |
          cargo clippy --manifest-path Cargo.toml --all-targets --target wasm32-unknown-unknown -- \
            -D warnings \
            -D clippy::all \
            -D clippy::pedantic \
            -D clippy::nursery \
            -D clippy::unwrap_used \
            -D clippy::expect_used \
            -D clippy::panic \
            -D clippy::todo \
            -D clippy::unimplemented \
            -D clippy::dbg_macro \
            -D clippy::print_stdout \
            -D clippy::print_stderr

      - name: Clippy (Tauri backend)
        run: |
          cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- \
            -D warnings \
            -D clippy::all \
            -D clippy::pedantic \
            -D clippy::nursery \
            -D clippy::unwrap_used \
            -D clippy::expect_used \
            -D clippy::panic \
            -D clippy::todo \
            -D clippy::unimplemented \
            -D clippy::dbg_macro \
            -D clippy::print_stdout \
            -D clippy::print_stderr

      - name: Test (Tauri backend)
        run: cargo llvm-cov --manifest-path src-tauri/Cargo.toml --all-features --lcov --output-path lcov.info

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: wpm/kenken-designer
          files: lcov.info

      - name: Doc
        run: |
          cargo doc --manifest-path src-tauri/Cargo.toml --no-deps --all-features
        env:
          RUSTDOCFLAGS: -D warnings

  build:
    name: build (${{ matrix.os }})
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - name: Checkout kenken library
        uses: actions/checkout@v6
        with:
          repository: wpm/KenKen
          path: kenken-lib

      - name: Point kenken path dep to checked-out library
        shell: bash
        run: |
          sed -i.bak 's|kenken = { path = "../../kenken" }|kenken = { path = "../kenken-lib" }|' src-tauri/Cargo.toml
          rm src-tauri/Cargo.toml.bak

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: clippy

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.os }}
          workspaces: |
            . -> target
            src-tauri -> target

      - name: Keep downloaded apt packages
        if: matrix.os == 'ubuntu-latest'
        run: |
          echo 'Binary::apt::APT::Keep-Downloaded-Packages "true";' \
            | sudo tee /etc/apt/apt.conf.d/99keep-debs > /dev/null

      - name: Cache apt packages
        if: matrix.os == 'ubuntu-latest'
        id: apt-cache
        uses: actions/cache@v5
        with:
          path: |
            /var/cache/apt/archives
            /var/lib/apt/lists
          key: apt-${{ runner.os }}-libwebkit2gtk-4.1-libappindicator3-librsvg2-patchelf

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          if [ "${{ steps.apt-cache.outputs.cache-hit }}" != "true" ]; then
            sudo apt-get update
          fi
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Build (frontend wasm)
        shell: bash
        run: cargo build --manifest-path Cargo.toml --target wasm32-unknown-unknown --all-targets

      - name: Build (Tauri backend)
        shell: bash
        run: cargo build --manifest-path src-tauri/Cargo.toml --all-features --all-targets

      - name: Test (Tauri backend)
        shell: bash
        run: cargo test --manifest-path src-tauri/Cargo.toml --all-features

      - name: Test (frontend)
        shell: bash
        run: cargo test --manifest-path Cargo.toml
