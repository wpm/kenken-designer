<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="KenKen Designer favicon (grid)">
  <!-- Simplified favicon: drops clue text, keeps cages + the "2". Strokes thickened proportionally. -->
  <rect width="32" height="32" rx="6" ry="6" fill="#f4efe6"/>
  <!-- 3x3 cells, cell=8, origin (4,4) -->
  <!-- Cage A: (0,0)(0,1) blue -->
  <rect x="4"  y="4"  width="8" height="8" fill="#cfe4f2"/>
  <rect x="12" y="4"  width="8" height="8" fill="#cfe4f2"/>
  <!-- Cage B: (0,2)(1,1)(1,2) green -->
  <rect x="20" y="4"  width="8" height="8" fill="#d7ecd5"/>
  <rect x="12" y="12" width="8" height="8" fill="#d7ecd5"/>
  <rect x="20" y="12" width="8" height="8" fill="#d7ecd5"/>
  <!-- Cage C: (1,0)(2,0)(2,1) yellow -->
  <rect x="4"  y="12" width="8" height="8" fill="#f7ecc6"/>
  <rect x="4"  y="20" width="8" height="8" fill="#f7ecc6"/>
  <rect x="12" y="20" width="8" height="8" fill="#f7ecc6"/>
  <!-- Cage D: (2,2) rose -->
  <rect x="20" y="20" width="8" height="8" fill="#f6d9d3"/>

  <!-- Bold cage outlines only (drop intra-cage thin lines at 32px) -->
  <g fill="none" stroke="#26221b" stroke-width="1.4" stroke-linejoin="miter">
    <rect x="4" y="4" width="24" height="24"/>
    <line x1="4"  y1="12" x2="20" y2="12"/>   <!-- A vs C divider -->
    <line x1="20" y1="4"  x2="20" y2="12"/>   <!-- A vs B divider -->
    <line x1="12" y1="12" x2="12" y2="20"/>   <!-- C vs B divider -->
    <line x1="12" y1="20" x2="20" y2="20"/>   <!-- B vs C divider -->
    <line x1="20" y1="20" x2="20" y2="28"/>   <!-- B/C vs D divider -->
  </g>

  <!-- The solved "2" -->
  <text x="24" y="27"
        font-family="'Fraunces', Georgia, serif"
        font-size="9"
        font-weight="700"
        fill="#26221b"
        text-anchor="middle">2</text>
</svg>
